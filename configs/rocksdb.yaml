total_rows: 100000000
select_rows: 1000
select_cols: 10
write_batch_size: 100000
measurement_time_secs: 30
warmup_time_secs: 5
sample_size: 50
backend:
  # Two table formats run head-to-head; each variant uses its own data_dir
  # so the previous variant's SSTs don't bleed into the next run.
  # Settings mirror murr 0.2.0's PlainConfig::default() / BlockConfig::default().
  memory:
    data_dir: "/tmp/murr-bench-rocksdb-plain"
    table_format: plain

    # PlainTable settings (PlainTable forces mmap_reads=true internally).
    plain_bloom_bits_per_key: 16         # murr default
    plain_hash_table_ratio: 0.75         # murr default
    plain_index_sparseness: 4            # murr default
    plain_store_index_in_file: false     # murr default

    mmap_reads: true
    use_direct_reads: false
    async_io: true
    verify_checksums: false
    # murr's PlainConfig default is ReadMethod::ParGet (single-key gets, parallelized),
    # which corresponds to the non-batched multi_get_cf_opt path here.
    batched_multi_get: false
    sorted_input: false

  disk:
    data_dir: "/tmp/murr-bench-rocksdb-block"
    table_format: block_based

    bloom_filter_bits_per_key: null      # murr default: None (disabled)
    whole_key_filtering: true            # murr default
    block_size: 512                      # murr default
    block_cache_mb: 0                    # murr default: 0 = LRU cache disabled
    cache_index_and_filter_blocks: false # murr default
    pin_l0_filter_and_index_blocks: false # murr default
    block_restart_interval: 8            # murr default
    data_block_hash_index: true          # murr default
    data_block_hash_ratio: 0.75          # murr default
    mmap_reads: true                     # murr default
    use_direct_reads: false              # murr default
    async_io: true                       # murr default
    verify_checksums: false              # murr default
    # murr's BlockConfig default is ReadMethod::ParMultiGet — batched multi_get,
    # which requires pre-sorted input for the batched_multi_get_cf_opt fast path.
    batched_multi_get: true
    sorted_input: true
