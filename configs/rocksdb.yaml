total_rows: 100000000
select_rows: 1000
select_cols: 10
write_batch_size: 100000
measurement_time_secs: 10
warmup_time_secs: 5
sample_size: 10
backend:
  data_dir: "/tmp/murr-bench-rocksdb"
  # table_format: block_based            # "block_based" or "plain"

  # # PlainTable settings (only used when table_format = plain; forces mmap_reads=true)
  # plain_bloom_bits_per_key: 10         # 0 disables bloom in PlainTable
  # plain_hash_table_ratio: 0.75
  # plain_index_sparseness: 16
  # plain_store_index_in_file: false

  # bloom_filter_bits_per_key: null      # null = bloom disabled
  # whole_key_filtering: true            # only meaningful when bloom is enabled
  # block_size: 512
  # block_cache_mb: 0                    # 0 = block cache disabled
  # cache_index_and_filter_blocks: false
  # pin_l0_filter_and_index_blocks: false
  # block_restart_interval: 8
  # data_block_hash_index: true          # true = BinaryAndHash, false = BinarySearch
  # data_block_hash_ratio: 0.75
  # mmap_reads: true
  # use_direct_reads: false              # O_DIRECT for SST reads; mutually exclusive with mmap_reads
  # async_io: true                       # no-op when mmap_reads = true
  # verify_checksums: false
  # batched_multi_get: true              # true = batched_multi_get_cf_opt, false = multi_get_cf_opt
  # sorted_input: true                   # only used with batched_multi_get

  table_format: plain            # "block_based" or "plain"

  # PlainTable settings (only used when table_format = plain; forces mmap_reads=true)
  plain_bloom_bits_per_key: 0         # 0 disables bloom in PlainTable
  plain_hash_table_ratio: 0.75
  plain_index_sparseness: 8
  plain_store_index_in_file: false

  bloom_filter_bits_per_key: null      # null = bloom disabled
  whole_key_filtering: true            # only meaningful when bloom is enabled
  block_size: 512
  block_cache_mb: 0                    # 0 = block cache disabled
  cache_index_and_filter_blocks: false
  pin_l0_filter_and_index_blocks: false
  block_restart_interval: 8
  data_block_hash_index: true          # true = BinaryAndHash, false = BinarySearch
  data_block_hash_ratio: 0.75
  mmap_reads: true
  use_direct_reads: false              # O_DIRECT for SST reads; mutually exclusive with mmap_reads
  async_io: true                       # no-op when mmap_reads = true
  verify_checksums: false
  batched_multi_get: false              # true = batched_multi_get_cf_opt, false = multi_get_cf_opt
  sorted_input: false                   # only used with batched_multi_get

